<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资分析系统 V8.2 - 仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #718096;
            font-size: 14px;
        }
        
        .header-meta {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .meta-item {
            background: #f7fafc;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #4a5568;
        }
        
        .meta-item strong {
            color: #2d3748;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-title .icon {
            font-size: 24px;
        }
        
        .price-display {
            text-align: center;
            padding: 20px 0;
        }
        
        .price-main {
            font-size: 42px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 8px;
        }
        
        .price-change {
            font-size: 18px;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 600;
        }
        
        .price-change.up {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .price-change.down {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .price-change.neutral {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .price-detail {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
        }
        
        .price-row label {
            color: #718096;
        }
        
        .price-row span {
            color: #2d3748;
            font-weight: 500;
        }
        
        .prediction-box {
            text-align: center;
            padding: 20px 0;
        }
        
        .prediction-direction {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .prediction-confidence {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .confidence-high {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .confidence-medium {
            background: #feebc8;
            color: #7c2d12;
        }
        
        .confidence-low {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .prediction-signal {
            font-size: 24px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 20px;
        }
        
        .accuracy-display {
            text-align: center;
            padding: 20px 0;
        }
        
        .accuracy-rate {
            font-size: 48px;
            font-weight: 700;
            color: #48bb78;
            margin-bottom: 8px;
        }
        
        .accuracy-detail {
            color: #718096;
            font-size: 14px;
        }
        
        .chart-container {
            height: 300px;
            margin-top: 20px;
        }
        
        .news-list {
            list-style: none;
        }
        
        .news-item {
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .news-item:last-child {
            border-bottom: none;
        }
        
        .news-title {
            font-size: 14px;
            color: #2d3748;
            margin-bottom: 4px;
            line-height: 1.5;
        }
        
        .news-meta {
            font-size: 12px;
            color: #a0aec0;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }
        
        .error {
            text-align: center;
            padding: 40px;
            color: #e53e3e;
            background: #fff5f5;
            border-radius: 8px;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5a67d8;
        }
        
        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
            font-size: 13px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading-text {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📊 投资分析系统仪表盘</h1>
            <p>实时金价 · 智能预测 · 基金推荐 · 市场概览</p>
            <div class="header-meta">
                <div class="meta-item">
                    <strong>版本:</strong> V8.2.0
                </div>
                <div class="meta-item">
                    <strong>数据源:</strong> 东方财富-COMEX 黄金期货
                </div>
                <div class="meta-item">
                    <strong>更新时间:</strong> <span id="update-time">-</span>
                </div>
                <button class="refresh-btn" onclick="refreshAll()">🔄 刷新数据</button>
            </div>
        </div>
        
        <!-- 第一行：金价和预测 -->
        <div class="grid">
            <!-- 金价卡片 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">💰</span>
                    实时金价
                </div>
                <div id="gold-price">
                    <div class="loading loading-text">加载中...</div>
                </div>
            </div>
            
            <!-- 预测卡片 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">🔮</span>
                    今日预测
                </div>
                <div id="prediction">
                    <div class="loading loading-text">加载中...</div>
                </div>
            </div>
            
            <!-- 准确率卡片 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">📈</span>
                    预测准确率
                </div>
                <div id="accuracy">
                    <div class="loading loading-text">加载中...</div>
                </div>
            </div>
        </div>
        
        <!-- 第二行：图表和新闻 -->
        <div class="grid" style="grid-template-columns: 2fr 1fr;">
            <!-- 金价走势图 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">📊</span>
                    金价走势（30 天）
                </div>
                <div id="gold-chart" class="chart-container">
                    <div class="loading loading-text">加载图表...</div>
                </div>
            </div>
            
            <!-- 最新新闻 -->
            <div class="card">
                <div class="card-title">
                    <span class="icon">📰</span>
                    最新财经新闻
                </div>
                <div id="news-list">
                    <div class="loading loading-text">加载新闻...</div>
                </div>
            </div>
        </div>
        
        <!-- 底部 -->
        <div class="footer">
            <p>投资分析系统 V8.2.0 | 数据仅供参考，不构成投资建议</p>
            <p>API 文档：<a href="/docs" style="color: white;">/docs</a> | 
               最后更新：<span id="footer-time">-</span></p>
        </div>
    </div>
    
    <script>
        // 全局变量
        let goldChart = null;
        
        // 格式化数字
        function formatNumber(num, decimals = 2) {
            return Number(num).toFixed(decimals);
        }
        
        // 格式化时间
        function formatTime(timeStr) {
            if (!timeStr) return '-';
            return timeStr.replace('T', ' ').substring(0, 16);
        }
        
        // 获取涨跌样式
        function getChangeClass(change) {
            if (change > 0) return 'up';
            if (change < 0) return 'down';
            return 'neutral';
        }
        
        // 获取涨跌符号
        function getChangeSymbol(change) {
            if (change > 0) return '+';
            return '';
        }
        
        // 加载金价数据
        async function loadGoldPrice() {
            try {
                const response = await fetch('/api/gold/price');
                const data = await response.json();
                
                const changeClass = getChangeClass(data.change_amount);
                const changeSymbol = getChangeSymbol(data.change_amount);
                
                document.getElementById('gold-price').innerHTML = `
                    <div class="price-display">
                        <div class="price-main">$${formatNumber(data.international_usd_per_oz)}</div>
                        <div class="price-change ${changeClass}">
                            ${changeSymbol}${formatNumber(data.change_amount)} (${changeSymbol}${formatNumber(data.change_percent)}%)
                        </div>
                        <div class="price-detail">
                            <div class="price-row">
                                <label>国内金价</label>
                                <span>¥${formatNumber(data.domestic_cny_per_gram)}/g</span>
                            </div>
                            <div class="price-row">
                                <label>数据来源</label>
                                <span>${data.source}</span>
                            </div>
                            <div class="price-row">
                                <label>更新时间</label>
                                <span>${formatTime(data.update_time)}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                // 更新头部时间
                document.getElementById('update-time').textContent = formatTime(data.update_time);
                document.getElementById('footer-time').textContent = new Date().toLocaleString('zh-CN');
                
            } catch (error) {
                document.getElementById('gold-price').innerHTML = `
                    <div class="error">加载失败：${error.message}</div>
                `;
            }
        }
        
        // 加载预测数据
        async function loadPrediction() {
            try {
                const response = await fetch('/api/prediction/today');
                const data = await response.json();
                
                const confidenceClass = `confidence-${data.confidence === '高' ? 'high' : data.confidence === '中' ? 'medium' : 'low'}`;
                
                document.getElementById('prediction').innerHTML = `
                    <div class="prediction-box">
                        <div class="prediction-direction">${data.direction}</div>
                        <div class="prediction-confidence ${confidenceClass}">
                            置信度：${data.confidence}
                        </div>
                        <div class="prediction-signal">🎯 ${data.signal}</div>
                        <div class="price-detail">
                            <div class="price-row">
                                <label>当前价格</label>
                                <span>¥${formatNumber(data.current_price)}</span>
                            </div>
                            <div class="price-row">
                                <label>预测价格</label>
                                <span>¥${formatNumber(data.predicted_price)}</span>
                            </div>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                document.getElementById('prediction').innerHTML = `
                    <div class="error">加载失败：${error.message}</div>
                `;
            }
        }
        
        // 加载准确率数据
        async function loadAccuracy() {
            try {
                const response = await fetch('/api/accuracy/stats?period=30');
                const data = await response.json();
                
                document.getElementById('accuracy').innerHTML = `
                    <div class="accuracy-display">
                        <div class="accuracy-rate">${formatNumber(data.accuracy_rate, 1)}%</div>
                        <div class="accuracy-detail">
                            过去 ${data.period_days} 天 · 正确 ${data.correct_predictions}/${data.total_predictions} 次
                        </div>
                    </div>
                `;
                
            } catch (error) {
                document.getElementById('accuracy').innerHTML = `
                    <div class="error">加载失败：${error.message}</div>
                `;
            }
        }
        
        // 加载金价历史图表
        async function loadGoldChart() {
            try {
                const response = await fetch('/api/gold/history?days=30');
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    document.getElementById('gold-chart').innerHTML = '<div class="loading">暂无历史数据</div>';
                    return;
                }
                
                // 准备图表数据
                const dates = data.map(item => item.date || item.update_time?.substring(0, 10));
                const prices = data.map(item => item.international_usd_per_oz);
                
                // 创建图表
                const chartDom = document.getElementById('gold-chart');
                if (goldChart) {
                    goldChart.dispose();
                }
                
                goldChart = echarts.init(chartDom);
                
                const option = {
                    tooltip: {
                        trigger: 'axis',
                        formatter: '{b}<br/>${c}'
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: dates,
                        axisLabel: {
                            rotate: 45,
                            interval: 'auto'
                        }
                    },
                    yAxis: {
                        type: 'value',
                        axisLabel: {
                            formatter: '${value}'
                        }
                    },
                    series: [{
                        data: prices,
                        type: 'line',
                        smooth: true,
                        lineStyle: {
                            color: '#667eea',
                            width: 3
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(102, 126, 234, 0.3)' },
                                { offset: 1, color: 'rgba(102, 126, 234, 0.05)' }
                            ])
                        },
                        itemStyle: {
                            color: '#667eea'
                        }
                    }]
                };
                
                goldChart.setOption(option);
                
                // 响应式调整
                window.addEventListener('resize', () => {
                    goldChart.resize();
                });
                
            } catch (error) {
                document.getElementById('gold-chart').innerHTML = `
                    <div class="error">加载图表失败：${error.message}</div>
                `;
            }
        }
        
        // 加载新闻列表
        async function loadNews() {
            try {
                const response = await fetch('/api/news/latest?limit=10');
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    document.getElementById('news-list').innerHTML = '<div class="loading">暂无新闻</div>';
                    return;
                }
                
                const newsHtml = data.slice(0, 10).map(news => `
                    <li class="news-item">
                        <div class="news-title">${news.title || '无标题'}</div>
                        <div class="news-meta">
                            ${news.source ? news.source + ' · ' : ''}
                            ${news.publish_time ? formatTime(news.publish_time) : ''}
                        </div>
                    </li>
                `).join('');
                
                document.getElementById('news-list').innerHTML = `<ul class="news-list">${newsHtml}</ul>`;
                
            } catch (error) {
                document.getElementById('news-list').innerHTML = `
                    <div class="error">加载新闻失败：${error.message}</div>
                `;
            }
        }
        
        // 刷新所有数据
        async function refreshAll() {
            console.log('刷新数据...');
            await Promise.all([
                loadGoldPrice(),
                loadPrediction(),
                loadAccuracy(),
                loadGoldChart(),
                loadNews()
            ]);
            console.log('刷新完成');
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshAll();
            
            // 每 60 秒自动刷新
            setInterval(refreshAll, 60000);
        });
    </script>
</body>
</html>
